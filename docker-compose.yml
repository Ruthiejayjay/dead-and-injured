services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: dai_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - dai_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: dai_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dai_network

  db:
    image: mysql:8.0
    container_name: dai_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dead_injured
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    ports:
      - "3307:3306"
    volumes:
      - dai_db_data:/var/lib/mysql
    networks:
      - dai_network

  node:
    image: node:20-alpine
    container_name: dai_node
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - dai_network
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"

networks:
  dai_network:
    driver: bridge

volumes:
  dai_db_data:
    driver: local